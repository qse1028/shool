<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>首頁</title>

<style>
    body{
        font-family: "Hiragino Kaku Gothic ProN","Microsoft JhengHei",sans-serif;
        background: #f7f6f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        
    }
    body::before{
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background-image: url("bg.jpg");
    background-size: cover;
    background-position: center;

    opacity: 0.4;   /* 透明度（重點！） */
    z-index: -1;
    }
    .card {
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    text-align: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.16);
}

    h1{
        margin-bottom: 20px;
        color: #444;
    }

    /* 按鈕樣式 */
    .btn{
        display: inline-block;
        padding: 12px 25px;
        background: #a5d6a7;
        color: #333;
        text-decoration: none;
        border-radius: 10px;
        font-size: 16px;
        transition: 0.3s;
    }
    .container{
    background: rgba(255,255,255,0.9); /* 半透明白 */
    backdrop-filter: blur(5px);        /* 模糊效果（高級感） */
    }
    .btn:hover{
        background: #81c784;
        transform: translateY(-2px);
    }
</style>
</head>

<body>

<div class="card">
    <h1>我的網站</h1>

    <!-- 超連結按鈕 -->
    <a href="https://qse1028.github.io/qse.github.io/%E8%AA%B2%E8%A1%A8" class="btn">查看課表</a>
</div>

</body>
</html>
